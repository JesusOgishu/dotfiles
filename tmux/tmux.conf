set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ── NAVEGACIÓN DE PANES ──────────────────────────────────────
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# ── SPLITS ───────────────────────────────────────────────────
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind x kill-pane

# ── RESIZE ───────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── STATUS BAR (abajo) ───────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#74c7ec"
set -g window-status-current-style "bg=#1e1e2e,fg=#74c7ec,bold"
set -g window-status-style "bg=default,fg=#6c7086"

# ── PANE BORDERS ─────────────────────────────────────────────
set -g pane-border-lines single
set -g pane-border-style "fg=#585b70"
set -g pane-active-border-style "fg=#89dceb"

# pane-border-status bottom → aparece entre el contenido y el status de tmux
# muestra #{pane_title} que vim escribe, o el comando del shell en otros panes
set -g pane-border-status bottom
set -g pane-border-format ""
# sin set-titles → evita que el hostname aparezca en los panes
set -g set-titles off

# ── SESSIONS ─────────────────────────────────────────────────
bind-key n new-session -c "#{pane_current_path}" \; \
  send-keys "vim ." Enter \; \
  split-window -h -p 40 -c "#{pane_current_path}" \; \
  send-keys "git status" Enter \; \
  split-window -v -c "#{pane_current_path}" \; \
  send-keys "php artisan serve" Enter \; \
  select-pane -L

bind-key m new-session -c "#{pane_current_path}" \; \
  send-keys "y" Enter \; \
  split-window -h -p 60 -c "#{pane_current_path}" \; \
  send-keys "vim ." Enter \; \
  split-window -h -p 25 -c "#{pane_current_path}" \; \
  send-keys "git status" Enter \; \
  split-window -v -c "#{pane_current_path}" \; \
  send-keys "php artisan serve" Enter \; \
  select-pane -L
