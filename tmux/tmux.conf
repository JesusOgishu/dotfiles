set -g prefix C-a
unbind C-b
bind C-a send-prefix
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# ── NAV PANES ────────────────────────────────────────────────
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# ── SWITCH WINDOWS ───────────────────────────────────────────
bind -n C-1 select-window -t 1
bind -n C-2 select-window -t 2
bind -n C-3 select-window -t 3
bind -n C-4 select-window -t 4
bind -n C-5 select-window -t 5

# ── SPLITS ───────────────────────────────────────────────────
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind x kill-pane

# ── RESIZE ───────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── STATUS BAR ───────────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#74c7ec"
set -g window-status-current-style "bg=#1e1e2e,fg=#74c7ec,bold"
set -g window-status-style "bg=default,fg=#6c7086"

# ── PANE BORDERS ─────────────────────────────────────────────
set -g pane-border-lines single
set -g pane-border-style "fg=#585b70"
set -g pane-active-border-style "fg=#89dceb"
set -g pane-border-status bottom
set -g pane-border-format ""
set -g set-titles off

# ── SESSION M ────────────────────────────────────────────────
bind-key m new-session -c "#{pane_current_path}" \; \
  send-keys "vim ." Enter \; \
  split-window -h -c "#{pane_current_path}" \; \
  send-keys "y" Enter \; \
  run-shell "tmux new-session -d -s artisan_bg -c #{pane_current_path} 'php artisan serve'"
